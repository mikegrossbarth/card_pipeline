<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Card Ladder Auto-Comp</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Auto-Comp</h1>
      <input id="queueFile" type="file" accept="application/json">
      <div class="actions">
        <button id="loadQueue">Load Queue</button>
        <button id="start">Run Window</button>
        <button id="testBgs">Test BGS Dropdown</button>
        <button id="capture">Capture Page</button>
        <button id="download">Download Results</button>
      </div>
      <label>
        Delay
        <input id="delayMs" type="number" min="500" step="250" value="2000">
      </label>
      <pre id="status">Open Card Ladder Sales History, load queue, then start.</pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
